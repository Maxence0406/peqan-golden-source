<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peqan — Fund Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;padding:1.5rem;max-width:1100px;margin:0 auto}
.db-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 0.75rem;border-bottom:1px solid rgba(0,0,0,0.1);margin-bottom:1rem}
.db-title{font-size:15px;font-weight:500;letter-spacing:-.01em}
.db-subtitle{font-size:12px;color:#888;margin-top:2px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-bar select{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
.filter-bar label{font-size:11px;color:#666}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.metric-card{background:#ebebea;border-radius:8px;padding:.75rem 1rem}
.metric-label{font-size:11px;color:#666;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;line-height:1.1}
.metric-sub{font-size:11px;color:#999;margin-top:3px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:600px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:1rem}
.chart-title{font-size:12px;font-weight:500;color:#666;margin-bottom:.75rem}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.chart-legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:#666}
.chart-legend em{width:9px;height:9px;border-radius:2px;display:inline-block}
.fund-table-wrap{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;margin-bottom:1rem}
.fund-table-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid rgba(0,0,0,0.08)}
.fund-table-title{font-size:12px;font-weight:500;color:#666}
table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12px}
thead th{padding:8px 12px;text-align:left;color:#999;font-weight:400;border-bottom:1px solid rgba(0,0,0,0.08);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tbody td{padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.06);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8f8f6;cursor:pointer}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px}
.badge-fcpr{background:#EAF3DE;color:#3B6D11}
.badge-fps{background:#FAEEDA;color:#854F0B}
.badge-fpci{background:#E6F1FB;color:#185FA5}
.called-bar-wrap{display:flex;align-items:center;gap:6px}
.called-bar-bg{flex:1;height:4px;background:#e0e0de;border-radius:2px;overflow:hidden}
.called-bar-fill{height:100%;border-radius:2px}
.drill-panel{background:#f0f0ee;border:1px solid #ccc;border-radius:12px;padding:1rem;margin-bottom:1rem;display:none}
.drill-panel.visible{display:block}
.drill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.drill-title{font-size:13px;font-weight:500}
.drill-close{font-size:11px;color:#999;cursor:pointer;padding:4px 8px;border:1px solid #ccc;border-radius:6px;background:#fff}
.drill-tabs{display:flex;gap:4px;margin-bottom:.75rem}
.drill-tab{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #ccc;cursor:pointer;background:transparent;color:#666}
.drill-tab.active{background:#fff;color:#1a1a18;border-color:#999}
.drill-metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:.75rem}
.drill-metric{background:#fff;border-radius:8px;padding:.6rem .8rem;border:1px solid rgba(0,0,0,0.08)}
.drill-label{font-size:10px;color:#999;margin-bottom:2px}
.drill-value{font-size:14px;font-weight:500}
.sc-table,.port-table{width:100%;font-size:11px;border-collapse:collapse}
.sc-table th,.port-table th{padding:6px 8px;text-align:left;color:#999;font-weight:400;border-bottom:1px solid rgba(0,0,0,0.08)}
.sc-table td,.port-table td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,0.06)}
.sc-table tr:last-child td,.port-table tr:last-child td{border-bottom:none}
.port-table tr:hover{background:#f8f8f6}
.sc-table code{font-family:monospace;font-size:10px;color:#999}
.moic-positive{color:#1D9E75}
.moic-neutral{color:#BA7517}
.moic-negative{color:#D85A30}
.supabase-note{font-size:10px;color:#999;margin-top:6px;font-style:italic}
</style>
</head>
<body>

<div class="db-header">
  <div>
    <div class="db-title">Peqan — Fund Dashboard</div>
    <div class="db-subtitle">Golden source · Pilotage interne</div>
  </div>
  <div style="font-size:11px;color:#999">Snapshot : <span id="snap-label">—</span></div>
</div>

<div class="filter-bar">
  <label>Snapshot</label>
  <select id="filter-snap"></select>
  <label>Fonds</label>
  <select id="filter-fund"><option value="all">Tous les fonds</option></select>
</div>

<div class="metrics-grid" id="metrics-grid"></div>

<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-title">NAV consolidée — évolution (k€)</div>
    <div style="position:relative;width:100%;height:180px"><canvas id="chart-nav"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title" id="port-chart-title">Portefeuille — répartition par valeur</div>
    <div id="port-legend" class="chart-legend"></div>
    <div style="position:relative;width:100%;height:150px"><canvas id="chart-port"></canvas></div>
  </div>
</div>

<div class="drill-panel" id="drill-panel">
  <div class="drill-header">
    <span class="drill-title" id="drill-fund-name">Détail</span>
    <button class="drill-close" onclick="closeDrill()">fermer x</button>
  </div>
  <div class="drill-tabs">
    <button class="drill-tab active" onclick="showTab('overview')">Vue d'ensemble</button>
    <button class="drill-tab" onclick="showTab('classes')">Classes de parts</button>
    <button class="drill-tab" onclick="showTab('portfolio')">Portefeuille</button>
  </div>
  <div id="tab-overview"></div>
  <div id="tab-classes" style="display:none"></div>
  <div id="tab-portfolio" style="display:none"></div>
</div>

<div class="fund-table-wrap">
  <div class="fund-table-header">
    <div class="fund-table-title">Fonds — vue consolidée</div>
    <div style="font-size:11px;color:#999">Cliquer sur une ligne pour le detail</div>
  </div>
  <table>
    <thead>
      <tr>
        <th style="width:30%">Fonds</th>
        <th style="width:10%">Forme</th>
        <th style="width:16%">NAV</th>
        <th style="width:22%">Capital appele</th>
        <th style="width:14%">Engagement</th>
        <th style="width:8%">TVPI</th>
      </tr>
    </thead>
    <tbody id="fund-tbody"></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUPABASE_URL = 'https://fzpbfabkwvyxkdshefsb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6cGJmYWJrd3Z5eGtkc2hlZnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzIyMTAsImV4cCI6MjA5MjM0ODIxMH0.zl7Mu1U3e3uJG5YheKjSsNguODrjbYLpRCVz1UVyD6U';
const USE_SUPABASE = SUPABASE_URL !== '' && SUPABASE_ANON_KEY !== '';

async function supabaseFetch(table, params) {
  params = params || '';
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + params, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) {
    var err = await res.text();
    console.error('Supabase error on ' + table + ':', res.status, err);
    throw new Error(err);
  }
  return res.json();
}

var FUNDS = [];
var SHARE_CLASSES = [];
var ALL_SNAPSHOTS = [];
var SNAPSHOTS_RAW = [];
var PORTFOLIO = [];
var ALL_PORTFOLIO_RAW = [];
var currentSnapDate = '';
var currentFund = 'all';
var navChart, portChart;

function fmt(n, d) {
  d = d || 0;
  if (n == null) return '—';
  return new Intl.NumberFormat('fr-FR', {minimumFractionDigits: d, maximumFractionDigits: d}).format(n);
}
function fmtMM(n) { if (!n && n !== 0) return '—'; return (n/1000000).toFixed(2).replace('.', ',') + ' M€'; }
function fmtM(n) { return fmt(Math.round(n/1000)) + ' k€'; }
function fmtPct(n) { return (n*100).toFixed(1) + ' %'; }
function fmtRate(n) { return (n*100).toFixed(2) + ' %'; }
function calledColor(p) { return p >= 0.95 ? '#1D9E75' : p >= 0.6 ? '#BA7517' : '#D85A30'; }
function moicCls(m) { return m >= 1.2 ? 'moic-positive' : m >= 1.0 ? 'moic-neutral' : 'moic-negative'; }
function fmtDate(d) {
  if (!d) return '—';
  var parts = d.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function getSnap(fund_id) {
  for (var i = 0; i < ALL_SNAPSHOTS.length; i++) {
    if (ALL_SNAPSHOTS[i].fund_id === fund_id && ALL_SNAPSHOTS[i].snap_date === currentSnapDate) return ALL_SNAPSHOTS[i];
  }
  return null;
}
function filteredFunds() {
  if (currentFund === 'all') return FUNDS;
  return FUNDS.filter(function(f) { return f.fund_id === currentFund; });
}

function populateFilters() {
  var dates = [];
  ALL_SNAPSHOTS.forEach(function(s) { if (dates.indexOf(s.snap_date) === -1) dates.push(s.snap_date); });
  dates.sort().reverse();

  var snapSel = document.getElementById('filter-snap');
  snapSel.innerHTML = dates.map(function(d) {
    return '<option value="' + d + '">' + fmtDate(d) + '</option>';
  }).join('');
  currentSnapDate = dates[0] || '';
  document.getElementById('snap-label').textContent = fmtDate(currentSnapDate);

  var fundSel = document.getElementById('filter-fund');
  fundSel.innerHTML = '<option value="all">Tous les fonds</option>' +
    FUNDS.map(function(f) { return '<option value="' + f.fund_id + '">' + f.fund_name + '</option>'; }).join('');

  snapSel.onchange = function(e) {
    currentSnapDate = e.target.value;
    document.getElementById('snap-label').textContent = fmtDate(currentSnapDate);
    updatePortfolioForDate(currentSnapDate);
    update();
  };
  fundSel.onchange = function(e) { currentFund = e.target.value; update(); };
}

function updatePortfolioForDate(date) {
  var byFund = {};
  ALL_PORTFOLIO_RAW.forEach(function(p) {
    var d = p.snap_date;
    if (!byFund[p.fund_id]) byFund[p.fund_id] = {};
    if (!byFund[p.fund_id][d]) byFund[p.fund_id][d] = [];
    byFund[p.fund_id][d].push(p);
  });
  PORTFOLIO = [];
  Object.keys(byFund).forEach(function(fund_id) {
    var datesAvail = Object.keys(byFund[fund_id]).sort();
    var target = byFund[fund_id][date] ? date : datesAvail[datesAvail.length - 1];
    if (target) PORTFOLIO = PORTFOLIO.concat(byFund[fund_id][target]);
  });
}

function renderMetrics() {
  var funds = filteredFunds();
  var snaps = funds.map(function(f) { return getSnap(f.fund_id); }).filter(Boolean);
  var totalNAV    = snaps.reduce(function(a,s) { return a + s.nav; }, 0);
  var totalCommit = snaps.reduce(function(a,s) { return a + s.commitment; }, 0);
  var avgCalled   = snaps.length ? snaps.reduce(function(a,s) { return a + s.called_pct; }, 0) / snaps.length : 0;
  var totalShares = snaps.reduce(function(a,s) { return a + s.shares_issued; }, 0);
  var scCount = SHARE_CLASSES.filter(function(sc) { return funds.some(function(f) { return f.fund_id === sc.fund_id; }); }).length;
  document.getElementById('metrics-grid').innerHTML =
    '<div class="metric-card"><div class="metric-label">NAV totale</div><div class="metric-value">' + fmtMM(totalNAV) + '</div><div class="metric-sub">' + snaps.length + ' fonds · ' + fmtDate(currentSnapDate) + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Engagements</div><div class="metric-value">' + fmtMM(totalCommit) + '</div><div class="metric-sub">Capital souscrit</div></div>' +
    '<div class="metric-card"><div class="metric-label">Capital appele moy.</div><div class="metric-value" style="color:' + calledColor(avgCalled) + '">' + fmtPct(avgCalled) + '</div><div class="metric-sub">' + snaps.length + ' fonds avec donnees</div></div>' +
    '<div class="metric-card"><div class="metric-label">Parts emises</div><div class="metric-value">' + fmt(Math.round(totalShares)) + '</div><div class="metric-sub">' + scCount + ' classes de parts</div></div>';
}

function renderNAVChart() {
  var snaps;
  if (currentFund !== 'all') {
    snaps = ALL_SNAPSHOTS.filter(function(s) { return s.fund_id === currentFund; }).sort(function(a,b) { return a.snap_date.localeCompare(b.snap_date); });
  } else {
    var byDate = {};
    ALL_SNAPSHOTS.forEach(function(s) {
      if (!byDate[s.snap_date]) byDate[s.snap_date] = 0;
      byDate[s.snap_date] += s.nav;
    });
    snaps = Object.keys(byDate).sort().map(function(d) { return {snap_date: d, nav: byDate[d]}; });
  }
  var labels = snaps.map(function(s) { return fmtDate(s.snap_date); });
  var data = snaps.map(function(s) { return Math.round(s.nav / 1000); });
  if (navChart) navChart.destroy();
  navChart = new Chart(document.getElementById('chart-nav'), {
    type: 'line',
    data: {labels: labels, datasets: [{data: data, borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.07)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#185FA5', borderWidth: 1.5}]},
    options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}, tooltip: {callbacks: {label: function(ctx) { return ' ' + fmt(ctx.raw) + ' k€'; }}}}, scales: {x: {ticks: {font: {size: 9}, color: '#888', maxRotation: 45}, grid: {display: false}, border: {display: false}}, y: {ticks: {font: {size: 9}, color: '#888', callback: function(v) { return v >= 1000 ? (v/1000).toFixed(0) + 'M' : v; }}, grid: {color: 'rgba(0,0,0,0.06)'}, border: {display: false}}}}
  });
}

var PORT_COLORS = ['#185FA5','#1D9E75','#D85A30','#534AB7','#BA7517','#3B6D11','#993C1D','#854F0B','#0F6E56','#9FE1CB','#5DCAA5','#B4B2A9','#7C3AED','#0891B2','#BE185D','#D97706'];

function renderPortChart() {
  var fundFilter = currentFund === 'all' ? null : currentFund;
  var portData = PORTFOLIO.filter(function(p) { return p.strategy !== 'Cash' && (!fundFilter || p.fund_id === fundFilter); });
  var byCompany = {};
  portData.forEach(function(p) {
    if (!byCompany[p.company]) byCompany[p.company] = 0;
    byCompany[p.company] += p.value || 0;
  });
  var companies = Object.keys(byCompany).sort(function(a,b) { return byCompany[b] - byCompany[a]; });
  document.getElementById('port-legend').innerHTML = companies.map(function(c, i) {
    return '<span><em style="background:' + PORT_COLORS[i % PORT_COLORS.length] + '"></em>' + c + '</span>';
  }).join('');
  document.getElementById('port-chart-title').textContent = 'Portefeuille — repartition par valeur (' + fmtDate(currentSnapDate) + ')';
  if (portChart) portChart.destroy();
  if (!companies.length) return;
  portChart = new Chart(document.getElementById('chart-port'), {
    type: 'doughnut',
    data: {labels: companies, datasets: [{data: companies.map(function(c) { return byCompany[c]; }), backgroundColor: companies.map(function(_,i) { return PORT_COLORS[i % PORT_COLORS.length]; }), borderWidth: 1, borderColor: '#fff'}]},
    options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}, tooltip: {callbacks: {label: function(ctx) { return ' ' + fmtM(ctx.raw); }}}}, cutout: '60%'}
  });
}

function renderTable() {
  var tbody = document.getElementById('fund-tbody');
  tbody.innerHTML = '';
  filteredFunds().forEach(function(f) {
    var snap = getSnap(f.fund_id);
    var pct = snap ? snap.called_pct : 0;
    var tr = document.createElement('tr');
    var calledCell = snap ?
      '<div class="called-bar-wrap"><div class="called-bar-bg"><div class="called-bar-fill" style="width:' + Math.min(pct*100,100) + '%;background:' + calledColor(pct) + '"></div></div><span style="font-size:11px;color:' + calledColor(pct) + ';min-width:38px">' + fmtPct(pct) + '</span></div>' : '—';
    tr.innerHTML =
      '<td title="' + f.fund_name + '">' + f.fund_name + '</td>' +
      '<td><span class="badge badge-' + f.legal_form.toLowerCase() + '">' + f.legal_form + '</span></td>' +
      '<td>' + (snap ? fmtMM(snap.nav) : '—') + '</td>' +
      '<td>' + calledCell + '</td>' +
      '<td>' + (snap ? fmtMM(snap.commitment) : '—') + '</td>' +
      var tvpi_row = snap && snap.commitment > 0 && snap.called_pct > 0 ? snap.nav / (snap.commitment * snap.called_pct) : null;
      '<td class="' + (tvpi_row ? moicCls(tvpi_row) : '') + '">' + (tvpi_row ? tvpi_row.toFixed(2) + 'x' : '—') + '</td>';
    tr.onclick = function() { openDrill(f.fund_id); };
    tbody.appendChild(tr);
  });
}

function openDrill(fund_id) {
  var fund = FUNDS.find(function(f) { return f.fund_id === fund_id; });
  var snap = getSnap(fund_id);
  document.getElementById('drill-fund-name').textContent = fund.fund_name;
  var panel = document.getElementById('drill-panel');
  panel._fund_id = fund_id;
  panel._snap = snap;
  renderTab(fund_id, snap, 'overview');
  showTab('overview');
  panel.classList.add('visible');
  panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}
function closeDrill() { document.getElementById('drill-panel').classList.remove('visible'); }

function showTab(tab) {
  ['overview','classes','portfolio'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.drill-tab').forEach(function(btn, i) {
    btn.classList.toggle('active', ['overview','classes','portfolio'][i] === tab);
  });
  var p = document.getElementById('drill-panel');
  if (p._fund_id) renderTab(p._fund_id, p._snap, tab);
}

function renderTab(fund_id, snap, tab) {
  var fund = FUNDS.find(function(f) { return f.fund_id === fund_id; });
  var sc = SHARE_CLASSES.filter(function(x) { return x.fund_id === fund_id; });

  if (tab === 'overview') {
    var tvpi = snap && snap.called_pct > 0 ? snap.nav / (snap.commitment * snap.called_pct) : null;
    var moic = tvpi;
    document.getElementById('tab-overview').innerHTML =
      '<div class="drill-metrics-grid">' +
      '<div class="drill-metric"><div class="drill-label">NAV</div><div class="drill-value">' + (snap ? fmtMM(snap.nav) : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Engagements</div><div class="drill-value">' + (snap ? fmtMM(snap.commitment) : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Capital appele</div><div class="drill-value" style="color:' + (snap ? calledColor(snap.called_pct) : 'inherit') + '">' + (snap ? fmtPct(snap.called_pct) : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Parts emises</div><div class="drill-value">' + (snap ? fmt(Math.round(snap.shares_issued)) : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">TVPI (NAV/Appelé)</div><div class="drill-value ' + (tvpi ? moicCls(tvpi) : '') + '">' + (tvpi ? tvpi.toFixed(2) + 'x' : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Forme juridique</div><div class="drill-value">' + fund.legal_form + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">SFDR</div><div class="drill-value">Article ' + fund.sfdr_article + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Duree</div><div class="drill-value">' + fund.fund_life_years + ' ans</div></div>' +
      '</div>';
  }

  if (tab === 'classes') {
    var classSnaps = SNAPSHOTS_RAW.filter(function(s) { return s.fund_id === fund_id && s.snap_date === currentSnapDate; });
    var rows = sc.map(function(c) {
      var cs = classSnaps.find(function(x) { return x.share_class_id === c.id; });
      return '<tr>' +
        '<td style="font-weight:500">' + c.name + '</td>' +
        '<td><code>' + c.isin + '</code></td>' +
        '<td style="text-align:right">' + fmt(c.nominal) + ' €</td>' +
        '<td style="text-align:right">' + (c.mgmt_fee ? fmtRate(c.mgmt_fee) : '—') + '</td>' +
        '<td style="text-align:right">' + (c.distrib_fee ? fmtRate(c.distrib_fee) : '—') + '</td>' +
        '<td style="text-align:right">' + (cs ? fmt(Math.round(cs.shares_issued)) : '—') + '</td>' +
        '<td style="text-align:right">' + (cs ? fmtMM(cs.net_asset_value) : '—') + '</td>' +
        '</tr>';
    }).join('');
    document.getElementById('tab-classes').innerHTML =
      '<table class="sc-table"><thead><tr><th>Classe</th><th>ISIN</th><th style="text-align:right">Nominal</th><th style="text-align:right">Frais gest.</th><th style="text-align:right">Frais distrib.</th><th style="text-align:right">Parts</th><th style="text-align:right">NAV</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  if (tab === 'portfolio') {
    var port = PORTFOLIO.filter(function(p) { return p.fund_id === fund_id && p.strategy !== 'Cash'; });
    var cash = PORTFOLIO.filter(function(p) { return p.fund_id === fund_id && p.strategy === 'Cash'; });
    var totalPrix  = port.reduce(function(a,p) { return a + (p.prix || 0); }, 0);
    var totalValue = port.reduce(function(a,p) { return a + (p.value || 0); }, 0);
    var globalMoic = totalPrix > 0 ? totalValue / totalPrix : null;
    var portRows = port.sort(function(a,b) { return b.value - a.value; }).map(function(p) {
      var moic = p.prix > 0 ? p.value / p.prix : null;
      return '<tr>' +
        '<td style="font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + p.company + '">' + p.company + '</td>' +
        '<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666" title="' + p.vehicle + '">' + p.vehicle + '</td>' +
        '<td>' + p.strategy + '</td>' +
        '<td style="text-align:right">' + fmtM(p.prix) + '</td>' +
        '<td style="text-align:right">' + fmtM(p.value) + '</td>' +
        '<td style="text-align:right" class="' + (moic ? moicCls(moic) : '') + '">' + (moic ? moic.toFixed(2) + 'x' : '—') + '</td>' +
        '</tr>';
    }).join('');
    var cashTotal = cash.reduce(function(a,p) { return a + p.value; }, 0);
    var cashRow = cash.length ? '<tr style="color:#999"><td colspan="4">Tresorerie (CASH)</td><td style="text-align:right">' + fmtM(cashTotal) + '</td><td style="text-align:right">—</td></tr>' : '';
    var noteDate = PORTFOLIO.find(function(p) { return p.fund_id === fund_id; });
    document.getElementById('tab-portfolio').innerHTML =
      '<div class="drill-metrics-grid" style="margin-bottom:.75rem">' +
      '<div class="drill-metric"><div class="drill-label">Prix total investi</div><div class="drill-value">' + fmtMM(totalPrix) + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Valeur totale</div><div class="drill-value">' + fmtMM(totalValue) + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">MOIC (valeur / prix)</div><div class="drill-value ' + (globalMoic ? moicCls(globalMoic) : '') + '">' + (globalMoic ? globalMoic.toFixed(2) + 'x' : '—') + '</div></div>' +
      '<div class="drill-metric"><div class="drill-label">Lignes</div><div class="drill-value">' + port.length + '</div></div>' +
      '</div>' +
      '<table class="port-table"><thead><tr><th>GP</th><th>Vehicule</th><th>Strategie</th><th style="text-align:right">Prix</th><th style="text-align:right">Valeur</th><th style="text-align:right">MOIC</th></tr></thead><tbody>' + portRows + cashRow + '</tbody></table>' +
      '<p class="supabase-note">MOIC = valeur / prix · ' + (noteDate ? fmtDate(noteDate.snap_date) : '') + ' · Hors CASH</p>';
  }
}

async function loadFromSupabase() {
  try {
    var results = await Promise.all([
      supabaseFetch('fund_static_data', 'select=*&order=fund_id.asc'),
      supabaseFetch('share_class_static_data', 'select=*'),
      supabaseFetch('fund_snapshot', 'select=*&order=snap_date.asc'),
      supabaseFetch('fund_portfolio', 'select=*&order=snap_date.asc'),
    ]);
    var funds = results[0], shareClasses = results[1], snapshots = results[2], portfolio = results[3];

    FUNDS = funds.map(function(f) {
      return {fund_id: f.fund_id, fund_name: f.fund_name, legal_form: f.legal_form, inception_date: f.inception_date, sfdr_article: f.sfdr_article, fund_life_years: f.fund_life_years};
    });

    SHARE_CLASSES = shareClasses.map(function(c) {
      return {fund_id: c.fund_id, id: c.share_class_id, name: c.share_class_name, isin: c.isin_code, nominal: c.nominal_value, mgmt_fee: c.management_fee_rate || 0, distrib_fee: c.distribution_fee_rate || 0};
    });

    SNAPSHOTS_RAW = snapshots.map(function(s) {
      return Object.assign({}, s, {snap_date: s.snap_date ? s.snap_date.substring(0, 10) : ''});
    });

    var snapMap = {};
    snapshots.forEach(function(s) {
      var date = s.snap_date ? s.snap_date.substring(0, 10) : '';
      var key = s.fund_id + '__' + date;
      if (!snapMap[key]) snapMap[key] = {fund_id: s.fund_id, snap_date: date, shares_issued: 0, called_sum: 0, called_count: 0, commitment: 0, nav: 0};
      snapMap[key].shares_issued += s.shares_issued || 0;
      snapMap[key].called_sum    += s.called_percentage || 0;
      snapMap[key].called_count  += 1;
      snapMap[key].commitment    += s.commitment_amount || 0;
      snapMap[key].nav           += s.net_asset_value || 0;
    });
    ALL_SNAPSHOTS = Object.values(snapMap).map(function(s) {
      return {fund_id: s.fund_id, snap_date: s.snap_date, shares_issued: s.shares_issued, called_pct: s.called_count > 0 ? s.called_sum / s.called_count : 0, commitment: s.commitment, nav: s.nav};
    });

    ALL_PORTFOLIO_RAW = portfolio.map(function(p) {
      return {fund_id: p.fund_id, company: p.fund_company, vehicle: p.vehicle, strategy: p.strategy, op_type: p.operation_type || 'n.a.', committed: p.investment_committed, prix: p.prix, value: p.investment_value, snap_date: p.snap_date ? p.snap_date.substring(0, 10) : ''};
    });

    console.log('Supabase charge :', FUNDS.length, 'fonds,', ALL_SNAPSHOTS.length, 'snapshots,', ALL_PORTFOLIO_RAW.length, 'lignes portfolio');
  } catch(e) {
    console.warn('Erreur Supabase :', e);
  }
}

function update() {
  updatePortfolioForDate(currentSnapDate);
  renderMetrics();
  renderNAVChart();
  renderPortChart();
  renderTable();
  closeDrill();
}

async function init() {
  if (USE_SUPABASE) await loadFromSupabase();
  populateFilters();
  update();
}

init();
</script>
